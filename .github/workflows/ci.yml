name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install CLI dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build:cli

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Build web
        run: cd web && npm run build

      - name: Type check
        run: npx tsc --noEmit

  demo-convert:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run demo conversion
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          npx ts-node src/cli/index.ts convert examples/sample.spec.ts \
            --output ./demo-output \
            --key $GROQ_API_KEY

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: momentic-report
          path: demo-output/
